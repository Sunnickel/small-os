[unstable]
bindeps = true

[build]
target = "x86_64-unknown-none"
rustdocflags = ["--deny", "rustdoc::broken_intra_doc_links"]

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
    "-C", "link-arg=--undefined=__start_commands",
    "-C", "force-frame-pointers=yes",
]

[env]
CC = "clang"
AR = "llvm-ar"

[alias]
xtask = "run --package xtask --"